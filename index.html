<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BumpDesk</title>
<style>
  body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f7;color:#333;}
  .msg{text-align:center;color:#666;font-size:15px;}
</style>
</head>
<body>
<div class="msg">Loading…</div>
<script>
(function(){
  var host = window.location.hostname; // e.g. 'kiacerritos.bumpdesk.ai'
  var sub  = host.split('.')[0];       // e.g. 'kiacerritos'

  // Kia subdomains → kia.html
  var kia = {kiacerritos:1, kiacarson:1, kiadowntownla:1};
  // MB subdomains → mb.html
  var mb  = {mbencino:1, mbvalencia:1};

  if(kia[sub]) {
    window.location.replace('kia.html');
  } else if(mb[sub]) {
    window.location.replace('mb.html');
  } else {
    // No subdomain or unknown — default to mb.html for backward compat
    window.location.replace('mb.html');
  }
})();
</script>
</body>
</html>
